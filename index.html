<!DOCTYPE html>
<html lang="en">
  <head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Vedro Lua Cryptor</title>
	<style>
	  /* Animations */

	  @keyframes popup {
		0% {
		  transform: scale(0);
		}

		100% {
		  transform: scale(1);
		}
	  }

	  @keyframes idle {
		0% {
		  transform: rotate(5deg);
		}

		100% {
		  transform: rotate(-5deg);
		}
	  }

	  /* CSS */
	  * {
		margin: 0;
		padding: 0;
		box-sizing: border-box;
		outline: none;
		border: none;
		text-decoration: none;
	  }

	  body {
		display: flex;
		font-family: monospace;
		color: white;
		height: 100vh;
		background-color: #000;
		justify-content: center;
		align-items: center;
	  }

	  /* navbar */
	  .navbar {
		display: flex;
		height: 5rem;
		justify-content: space-between;
		align-items: center;
		padding: 1.4rem 5%;
		background-color: rgba(20, 20, 20);
		border-bottom: 3px solid rgb(0, 255, 0);
		position: fixed;
		top: 0;
		left: 0;
		right: 0;
		z-index: 9999;
		box-shadow: 0 0px 20px #00FF00;
	  }

	  .logo span {
		color: #00FF00;
		transition: 0.2s ease-in-out;
	  }

	  .logo {
		display: flex;
		transition: 0.2s ease-in-out;
	  }

	  .logo:hover {
		color: rgb(255, 255, 255);
		transition: 0.2s ease-in-out;
	  }
	  .logo:hover span {
		color: rgb(255, 255, 255);
		transition: 0.2s ease-in-out;
	  }

	  .nav a {
		color: white;
		display: inline-block;
		font-size: 1rem;
		margin: 0 1rem;
		transition: 0.2s ease-in-out;
		transform: scale(0.9);
	  }

	  .nav a:hover {
		color: rgb(255, 255, 255, 0.7);
		transform: scale(1.1);
		transition: 0.2s ease-in-out;
	  }

	  .nav a::after {
		content: "";
		display: block;
		padding-bottom: 0.5rem;
		border-bottom: 0.1rem solid white;
		transform: scaleX(0);
		transition: 0.2s linear;
	  }

	  .nav a:hover::after {
		transform: scaleX(1);
	  }

	  .nav a .t,
	  .account {
		animation: popup 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) normal
		  calc(var(--order) * 100ms);
	  }

	  /* Profile */
	  .profile {
		border-radius: 20px;
		width: 2.5rem;
		transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
		height: 2.5rem;
		background-image: url("https://i.ibb.co/tPDvC3F/photo-2023-05-31-03-11-52.jpg");
		background-size: cover;
		background-repeat: no-repeat;
		box-shadow: 0 0 12px#00FF00;
	  }

	  .profile:hover {
		border-radius: 13px;
		border: 1.5px solid rgb(0, 255, 0, 1);
		transform: scale(1.5);
	  }

	  .profile:active {
		transform: scale(1.25);
	  }

	  /* Card Form */
	  form {
		width: 75%;
	  }
	  .card {
		display: block;
		width: 100%;
		position: relative;
		background-color: rgba(20, 20, 20);

		animation: popup 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 1 normal
		  forwards;
	  }

	  .card-header {
		display: flex;
		padding: 1rem;
		justify-content: center;
		align-items: center;
		border-bottom: 2px solid rgb(0, 255, 0);
	  }

	  .card-header h3 {
		color: white;
		transition: 0.5s;
	  }

	  .card-header h3:hover {
		color: rgb(255, 143, 16);
		transition: 0.5s;
	  }

	  .card-body {
		padding: 1rem;
	  }

	  /* Uploading File */
	  .filescript {
		margin-bottom: 1rem;
	  }

	  .filescript [type="file"] {
		display: none;
	  }

	  .filescript label {
		margin-top: 1rem;
		margin-bottom: 1rem;
		display: flex;
		justify-content: center;
		align-items: center;
		background: rgb(68, 68, 68);
		padding: 10px;
		transition: 0.2s ease-in-out;
		border-radius: 20px;
	  }

	  .filescript #num-of-files {
		display: flex;
		position: relative;
		margin-bottom: 1rem;
	  }

      .filescript label:hover {
        transform: scale(0.95);
	  }


	  /* Button submit */
	  .card-body button {
		border-radius: 20px;
		display: block;
		margin-top: 1rem;
		text-transform: uppercase;
		color: white;
		font-weight: 500;
		font-size: 1.5rem;
		position: relative;
		background: rgb(68, 68, 68);
		padding: 15px 60px;
		font-family: monospace;
		transition: 0.2s ease-in-out;
	  }

	  .card-body button:hover {
		letter-spacing: 0.1em;
		box-shadow: 0 0px 20px #00FF00;
		background: rgba(0, 255, 0);
	  }

	  .card-body button:before {
		content: "";
		position: absolute;
		inset: 2px;
		background: rgb(68, 68, 68);
		border-radius: 20px;
	  }

	  .card-body button span {
		position: relative;
		z-index: 1;
	  }

	  .card-body button i {
		position: absolute;
		inset: 0;
		display: block;
	  }


	  .card-body button:hover i::before {
		transform: translateX(-50%) translateY(-4px);
		border: 2px solid #fff;
		width: 30px;
		left: 20%;
	  }

	  .card-body button:hover i::after {
		width: 150px;
		height: 30px;
  
 }
 
	</style>
  </head>
  <body>
	<!-- Navbar -->
	<nav class="navbar">
	  <h1 class="logo"><span>Vedro</span>Cryptor</h1>
	  <div class="account" style="--order: 4">
		<div class="profile" onclick="goToTelegram()"></div>
	  </div>
	</nav>

	<!-- Card -->
	<form id="form">
	  <div class="card">
		<div class="card-header">
		  <h3>SAMP Lua Crypt</h3>
		</div>
		<div class="card-body">
		  <div class="filescript">
			<h3>Upload Your File Here!</h3>
			<input type="file" id="file" />
			<label for="file">Select file</label>
			<div id="num-of-files">No File Choosen</div>
			<h5>Only .lua .txt files</h5>
		  </div>
		  <button type="submit" id="Crypt">
			<span>Crypt</span><i></i>
		  </button>
		</div>
	  </div>
	</form>
	<script>
		function encryptFileName(fileName) {
		  // Получаем расширение файла
		  const extStartIndex = fileName.lastIndexOf('.');
		  const fileExt = fileName.slice(extStartIndex);
		  
		  // Получаем имя файла без расширения
		  const fileBaseName = fileName.slice(0, extStartIndex);
		  
		  // Добавляем приписку к имени файла
		  const encryptedFileName = fileBaseName + '-crypted' + fileExt;
		  
		  // Возвращаем измененное имя файла
		  return encryptedFileName;
		}

		function goToTelegram() {
			location.href = "https://t.me/ssxnox";
		}
		function getRandomInt(min, max) {
			return Math.floor(Math.random() * (max - min) + min);
		};
	  
		function crypt(text) {

				let n2 = getRandomInt(1, 20);
			}

			let key = [n3+1, text.charCodeAt(n3)];
			let crypted_text = '{{' + text.length;
			
			for (let i = 0; i < text.length; i++) {
				let char = text.charCodeAt(i);
				crypted_text += ',' + (char - n1 + n2);
			}
			
			crypted_text += '},{';
			
			for (let i = 0; i < key.length; i++) {
				crypted_text += key[i] + ',';
			}
			
			crypted_text = crypted_text.slice(0, -1) + '}}';

`;
			crypted_text = antidecompile + `local g = _G

	return str[char .. 'r']

	local n1, n2 = random(20), random(20)
	while tab[1][a + 1] - n2 + n1 ~= b do n1, n2 = random(20), random(20) end
	local decrypt_text = ''

		decrypt_text = decrypt_text .. char(tab[1][i] - n2 + n1)
	end

local res = decrypt` + crypted_text + `

local pcall = g[decrypt{{5, 125, 112, 110, 121, 121}, {4, 108}}]

local create = decrypt{{6, 114, 129, 116, 112, 131, 116}, {3, 101}}
local loadstring = g[decrypt{{10,106,109,95,98,113,114,112,103,108,101},{2,111}}]

	lua_thread[create](function() loadstring(res)() end)

			return crypted_text;
		};
	
	  const fileInput = document.getElementById("file");
	  const fileChoosen = document.getElementById("num-of-files");
	  const read = new FileReader();
	  const form = document.getElementById("form");
	  console.log(form);

	  fileInput.addEventListener("change", () => {
		let fileName = fileInput.files[0].name;
		let fileSize = (fileInput.files[0].size / 1024).toFixed(2);
		if (fileName.endsWith(".lua") || fileName.endsWith(".txt")) {
		  fileChoosen.innerHTML = `${fileName} (${fileSize}Kb)`;
		} else {
		  fileChoosen.innerHTML = `Please upload only lua file or txt file!`;
		}
	  });

	  form.addEventListener("submit", (event) => {
		console.log("Encrypting..");
		let file = document.getElementById("file").files[0];
		if (file == null) {
			alert("Please upload file first!");
		} else {
			read.readAsText(file);
			read.onload = () => {
			  const sc = read.result;
			  const Output =
				crypt(sc)
			  let blob = new Blob([Output], { type: "octet-stream" });
			  const href = URL.createObjectURL(blob);
			  const a = Object.assign(document.createElement("a"), {
				href,
				style: "display:none",
				download: encryptFileName(file.name),
			  });
			  a.click();
			  console.log("Downloading..");
			  URL.revokeObjectURL(href);
			  a.remove();
			};
		};
	  });
	</script>
  </body>
